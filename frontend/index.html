<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Emerald Password Share</title>
<style>
/* ── Reset & Base ─────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Brand palette */
  --navy:        #22242f;
  --navy-mid:    #2a2d3a;
  --navy-light:  #323648;
  --navy-dim:    #1c1e27;
  --forest:      #49974a;
  --forest-dim:  #2d5e2e;
  --forest-glow: rgba(73,151,74,0.15);
  --lime:        #aad052;
  --lime-dim:    rgba(170,208,82,0.15);
  --off-white:   #fdfeff;

  /* Semantic aliases (dark theme on navy base) */
  --c0: var(--navy);           /* page bg */
  --c1: var(--navy-mid);       /* slightly lighter */
  --c2: var(--navy-light);     /* card/input bg */
  --c3: #3a3d4f;               /* border subtle */
  --c4: #454859;               /* border normal */
  --c5: #565a70;               /* border hover */

  --t0: var(--off-white);      /* primary text */
  --t1: #c8cce0;               /* secondary text */
  --t2: #7a80a0;               /* muted text */

  --green:       var(--forest);
  --green-dim:   var(--forest-dim);
  --green-glow:  var(--forest-glow);
  --accent:      var(--lime);
  --accent-dim:  var(--lime-dim);

  --red:     hsl(0,68%,55%);
  --red-dim:  hsl(0,50%,15%);

  --mono:'Fira Code','Cascadia Code','JetBrains Mono','Courier New',monospace;
  --sans:system-ui,-apple-system,sans-serif;
  --radius:3px;
  --ease:cubic-bezier(0.4,0,0.2,1);
  --t:150ms;
}
html{font-size:15px;-webkit-text-size-adjust:100%}
body{
  font-family:var(--mono);
  background:var(--c0);
  color:var(--t0);
  min-height:100dvh;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  background-image: linear-gradient(160deg, #22242f 0%, #2a2d3a 60%, #22242f 100%);
}

/* ── Layout ───────────────────────────────────────────────────────── */
#root{
  min-height:100dvh;
  display:grid;
  grid-template-rows:auto 1fr auto;
}
.wrap{width:100%;max-width:560px;margin:0 auto;padding:0 1.25rem}

/* ── Header ───────────────────────────────────────────────────────── */
header{
  padding:2rem 0 1.5rem;
  text-align:center;
  border-bottom:1px solid var(--c3);
  background: linear-gradient(180deg, rgba(20,21,28,0.6) 0%, transparent 100%);
}
.logo-img{max-height:56px;max-width:100%;object-fit:contain;display:block;margin:0 auto}
.logo-text{
  font-size:1.05rem;font-weight:500;letter-spacing:0.12em;
  color:var(--lime);text-transform:uppercase;
}
.logo-text em{color:var(--t1);font-style:normal}

/* ── Main ─────────────────────────────────────────────────────────── */
main{padding:2rem 0 4rem}

/* ── Footer ───────────────────────────────────────────────────────── */
footer{
  border-top:1px solid var(--c3);
  padding:1rem 0;
  text-align:center;
  font-size:0.72rem;
  color:var(--t2);
}

/* ── Typography ───────────────────────────────────────────────────── */
.label{
  display:block;
  font-size:0.68rem;
  letter-spacing:0.12em;
  text-transform:uppercase;
  color:var(--t2);
  margin-bottom:0.35rem;
}
.hint{font-size:0.75rem;color:var(--t2);line-height:1.5;margin-bottom:1rem}
.error{color:var(--red);font-size:0.78rem;margin-top:0.4rem}
.warning{
  background:var(--red-dim);
  border:1px solid var(--red);
  padding:0.6rem 0.8rem;
  font-size:0.78rem;
  color:#ffaaaa;
  margin-bottom:1.2rem;
  border-radius:var(--radius);
}
.warning strong{color:#ff8888}
.info-box{
  background:rgba(73,151,74,0.08);
  border:1px solid var(--c4);
  border-left:3px solid var(--forest);
  padding:0.6rem 0.8rem;
  font-size:0.78rem;
  color:var(--t1);
  margin-bottom:1.2rem;
  border-radius:var(--radius);
}

/* ── Inputs ───────────────────────────────────────────────────────── */
input,textarea{
  width:100%;
  background:rgba(42,45,58,0.8);
  border:1px solid var(--c4);
  color:var(--t0);
  font-family:var(--mono);
  font-size:0.87rem;
  padding:0.6rem 0.75rem;
  outline:none;
  border-radius:var(--radius);
  transition:border-color var(--t) var(--ease), box-shadow var(--t) var(--ease);
  -webkit-appearance:none;
  appearance:none;
}
input:focus,textarea:focus{
  border-color:var(--lime);
  box-shadow:0 0 0 2px var(--lime-dim);
}
input[readonly]{color:var(--t1);cursor:text}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
textarea{
  resize:vertical;
  min-height:clamp(140px,30vh,260px);
  line-height:1.65;
}
.input-row{display:flex;gap:0.5rem;align-items:stretch}
.input-row input{flex:1}

/* ── Buttons ──────────────────────────────────────────────────────── */
button{font-family:var(--mono);border-radius:var(--radius);cursor:pointer;transition:all var(--t) var(--ease);font-size:0.85rem;border:none}
.btn-primary{
  background: linear-gradient(135deg, var(--forest) 0%, #5aad5b 100%);
  color:#fff;
  font-weight:600;
  padding:0.6rem 1.4rem;
  letter-spacing:0.04em;
  box-shadow:0 2px 8px rgba(73,151,74,0.3);
}
.btn-primary:hover{
  background: linear-gradient(135deg, #5aad5b 0%, var(--lime) 100%);
  color:var(--navy);
  box-shadow:0 4px 16px rgba(170,208,82,0.35);
  transform:translateY(-1px);
}
.btn-primary:active{transform:translateY(1px);box-shadow:none}
.btn-primary:disabled{opacity:0.4;pointer-events:none;transform:none}
.btn-outline{
  background:transparent;
  border:1px solid var(--c5);
  color:var(--t1);
  padding:0.55rem 1rem;
}
.btn-outline:hover{
  border-color:var(--lime);
  color:var(--lime);
  box-shadow:0 0 0 1px var(--lime-dim);
}
.btn-ghost{
  background:transparent;
  border:1px solid var(--c4);
  color:var(--t2);
  padding:0.5rem 0.8rem;
  font-size:0.78rem;
}
.btn-ghost:hover{border-color:var(--t1);color:var(--t1)}
.btn-icon{
  background:var(--navy-light);
  border:1px solid var(--c4);
  color:var(--t1);
  padding:0 0.75rem;
  white-space:nowrap;
  height:100%;
}
.btn-icon:hover{
  border-color:var(--lime);
  color:var(--lime);
  background:rgba(170,208,82,0.1);
}

/* ── Pill toggle (text/file) ──────────────────────────────────────── */
.mode-toggle{
  display:inline-flex;
  background:rgba(42,45,58,0.8);
  border:1px solid var(--c4);
  border-radius:4px;
  padding:2px;
  gap:2px;
  margin-bottom:1.25rem;
}
.mode-btn{
  background:transparent;border:none;
  padding:0.3rem 1rem;font-size:0.78rem;letter-spacing:0.06em;text-transform:uppercase;
  color:var(--t2);border-radius:3px;
  transition:all var(--t) var(--ease);
}
.mode-btn.active{
  background: linear-gradient(135deg, var(--forest) 0%, #5aad5b 100%);
  color:#fff;
}

/* ── Toggle switch ────────────────────────────────────────────────── */
.toggle-row{
  display:flex;align-items:center;gap:0.6rem;
  font-size:0.8rem;color:var(--t1);cursor:pointer;user-select:none;
}
.sw{
  width:34px;height:18px;flex-shrink:0;
  background:var(--c4);border-radius:9px;
  position:relative;transition:background var(--t) var(--ease);
}
.sw::after{
  content:'';position:absolute;
  top:3px;left:3px;width:12px;height:12px;
  background:var(--t2);border-radius:50%;
  transition:all var(--t) var(--ease);
}
.sw.on{background:var(--forest-dim)}
.sw.on::after{background:var(--lime);left:19px;box-shadow:0 0 4px rgba(170,208,82,0.5)}

/* ── Field group ──────────────────────────────────────────────────── */
.field{margin-bottom:1.1rem}
.field:last-child{margin-bottom:0}
.row-2{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem}

/* ── File drop zone ───────────────────────────────────────────────── */
.dropzone{
  border:1px dashed var(--c5);
  border-radius:var(--radius);
  padding:2rem;
  text-align:center;
  cursor:pointer;
  transition:all var(--t) var(--ease);
  background:rgba(42,45,58,0.5);
  min-height:120px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.5rem;
}
.dropzone:hover,.dropzone.dragover{
  border-color:var(--lime);
  background:var(--lime-dim);
  box-shadow:0 0 0 2px rgba(170,208,82,0.15);
}
.dropzone-icon{font-size:1.8rem;opacity:0.4}
.dropzone-label{font-size:0.8rem;color:var(--t2)}
.file-list{list-style:none;margin-top:0.8rem;width:100%;text-align:left}
.file-list li{
  display:flex;justify-content:space-between;align-items:center;
  padding:0.35rem 0.5rem;font-size:0.78rem;
  background:var(--navy-mid);border-radius:2px;margin-bottom:3px;
  border:1px solid var(--c3);
}
.file-list li span{color:var(--t2);font-size:0.72rem}

/* ── Advanced section ─────────────────────────────────────────────── */
.advanced{
  border-top:1px solid var(--c3);
  margin-top:1.2rem;
  padding-top:1.2rem;
  display:none;
}
.advanced.open{display:block}

/* ── Bottom bar ───────────────────────────────────────────────────── */
.bottom-bar{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:1rem;flex-wrap:wrap;gap:0.6rem;
}
.bottom-bar-left{display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.max-label{font-size:0.72rem;color:var(--t2)}
.status-msg{font-size:0.78rem;color:var(--t2);margin-top:0.6rem;min-height:1.2rem}

/* ── Upload progress bar ──────────────────────────────────────────── */
.progress-wrap{
  margin-top:0.8rem;
  display:none;
}
.progress-wrap.visible{display:block}
.progress-bar-bg{
  height:6px;
  background:var(--c3);
  border-radius:3px;
  overflow:hidden;
}
.progress-bar-fill{
  height:100%;
  background: linear-gradient(90deg, var(--forest), var(--lime));
  border-radius:3px;
  width:0%;
  transition:width 0.3s var(--ease);
}
.progress-label{
  font-size:0.7rem;
  color:var(--t2);
  margin-top:0.3rem;
  text-align:right;
}

/* ── Note result display ──────────────────────────────────────────── */
.note-box{
  background:rgba(42,45,58,0.8);
  border:1px solid var(--c4);
  border-radius:var(--radius);
  padding:1rem;
  white-space:pre-wrap;
  word-break:break-word;
  font-size:0.85rem;
  line-height:1.7;
  max-height:320px;
  overflow-y:auto;
  margin-bottom:0.8rem;
}
.file-dl-row{
  display:flex;justify-content:space-between;align-items:center;
  border:1px solid var(--c4);border-radius:var(--radius);
  padding:0.5rem 0.75rem;margin-bottom:0.4rem;
  background:rgba(42,45,58,0.8);
}
.file-dl-name{font-size:0.82rem}
.file-dl-meta{font-size:0.72rem;color:var(--t2)}
.file-dl-btn{
  background:transparent;border:none;color:var(--lime);
  font-family:var(--mono);font-size:0.82rem;cursor:pointer;font-weight:600;
}
.file-dl-btn:hover{text-decoration:underline;color:var(--forest)}

/* ── Links found ──────────────────────────────────────────────────── */
.links-box{margin-top:1rem;font-size:0.78rem}
.links-box p{color:var(--t2);margin-bottom:0.4rem}
.links-box a{color:var(--lime);word-break:break-all;display:block;margin-bottom:0.2rem}
.links-box a:hover{color:var(--forest)}

/* ── Share result card ────────────────────────────────────────────── */
.result-card{
  background:rgba(42,45,58,0.6);
  border:1px solid var(--c4);
  border-radius:4px;
  padding:1.5rem;
  box-shadow:0 4px 24px rgba(10,10,15,0.5);
}
.result-card h2{
  font-size:0.85rem;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--lime);margin-bottom:1.2rem;
}
.result-actions{display:flex;gap:0.5rem;margin-top:1rem;flex-wrap:wrap}

/* ── Loading spinner ──────────────────────────────────────────────── */
.spinner{
  display:inline-block;width:14px;height:14px;
  border:2px solid var(--c5);border-top-color:var(--lime);
  border-radius:50%;animation:spin 0.7s linear infinite;
  vertical-align:middle;margin-left:0.4rem;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Toast ────────────────────────────────────────────────────────── */
#toasts{
  position:fixed;bottom:1.5rem;right:1.5rem;
  display:flex;flex-direction:column-reverse;gap:0.5rem;
  z-index:1000;pointer-events:none;
}
.toast{
  background:var(--navy-mid);border:1px solid var(--c5);
  padding:0.5rem 1rem;font-size:0.78rem;border-radius:var(--radius);
  color:var(--t0);animation:toastIn 0.2s var(--ease);
  max-width:300px;
  box-shadow:0 4px 16px rgba(10,10,15,0.6);
}
.toast.ok{border-left:3px solid var(--lime)}
.toast.err{border-left:3px solid var(--red);color:#ffaaaa}
@keyframes toastIn{from{transform:translateX(1rem);opacity:0}to{transform:none;opacity:1}}

/* ── Divider ──────────────────────────────────────────────────────── */
.divider{border:none;border-top:1px solid var(--c3);margin:1.5rem 0}

/* ── Password prompt ──────────────────────────────────────────────── */
.pw-card{max-width:400px}
.pw-card p{font-size:0.82rem;color:var(--t1);margin-bottom:1.2rem}

/* ── Accent highlight for code ────────────────────────────────────── */
code{color:var(--lime)}

/* ── Responsive ───────────────────────────────────────────────────── */
@media(max-width:500px){
  header{padding:1.5rem 0 1rem}
  .row-2{grid-template-columns:1fr}
}

/* ── Page transitions ─────────────────────────────────────────────── */
.page{animation:fadeIn 0.18s var(--ease)}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ── Scrollbar ────────────────────────────────────────────────────── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#22242f}
::-webkit-scrollbar-thumb{background:var(--c4);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--forest)}
</style>
</head>
<body>
<div id="root">
  <header>
    <div class="wrap">
      <div id="logoArea">
        <div class="logo-text">emerald <em>password share</em></div>
      </div>
    </div>
  </header>
  <main>
    <div class="wrap">
      <div id="app"><div style="color:var(--t2);font-size:0.82rem;padding-top:2rem">Loading…<span class="spinner"></span></div></div>
    </div>
  </main>
  <footer>
    <div class="wrap">
      <span id="footerVer">Emerald Password Share</span>
    </div>
  </footer>
</div>
<div id="toasts"></div>

<script>
/* ═══════════════════════════════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════════════════════════════ */
const $ = id => document.getElementById(id)

function esc(s){
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

function setText(el, text){ if(el) el.textContent = text }

function render(content){
  const app = $('app')
  app.innerHTML = ''
  if(typeof content === 'string'){
    app.innerHTML = content
  } else {
    app.appendChild(content)
  }
}

function fmtBytes(b){
  if(b < 1024) return b + ' B'
  if(b < 1048576) return (b/1024).toFixed(1) + ' KB'
  return (b/1048576).toFixed(1) + ' MB'
}

function toast(msg, type='ok'){
  const wrap = $('toasts')
  const el = document.createElement('div')
  el.className = `toast ${type}`
  el.textContent = msg
  wrap.appendChild(el)
  setTimeout(()=>{ el.style.transition='opacity 0.3s'; el.style.opacity='0'; setTimeout(()=>el.remove(),320) }, 3200)
}

/* ═══════════════════════════════════════════════════════════════════
   CRYPTO  (WebCrypto AES-GCM-256 + PBKDF2)
═══════════════════════════════════════════════════════════════════ */
const toHex = buf => Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('')
const fromHex = str => new Uint8Array((str.match(/.{2}/g)||[]).map(h=>parseInt(h,16)))

async function genKey(){
  return crypto.subtle.generateKey({name:'AES-GCM',length:256},true,['encrypt','decrypt'])
}
async function exportKeyHex(k){ return toHex(await crypto.subtle.exportKey('raw',k)) }
async function importKeyHex(hex, usage=['decrypt']){
  return crypto.subtle.importKey('raw',fromHex(hex),{name:'AES-GCM'},false,usage)
}
async function deriveKey(password, saltHex){
  const enc = new TextEncoder()
  const salt = saltHex ? fromHex(saltHex) : crypto.getRandomValues(new Uint8Array(16))
  const base = await crypto.subtle.importKey('raw',enc.encode(password),{name:'PBKDF2'},false,['deriveKey'])
  const key  = await crypto.subtle.deriveKey(
    {name:'PBKDF2',salt,iterations:200000,hash:'SHA-256'},
    base,{name:'AES-GCM',length:256},false,['encrypt','decrypt']
  )
  return {key, saltHex: toHex(salt)}
}
async function encrypt(plainBytes, key){
  const iv = crypto.getRandomValues(new Uint8Array(12))
  const ct = await crypto.subtle.encrypt({name:'AES-GCM',iv},key,plainBytes)
  return toHex(iv) + toHex(ct)
}
async function encryptText(text, key){ return encrypt(new TextEncoder().encode(text), key) }

// How many bytes of plaintext per file slice.
// AES-GCM adds 16 bytes tag; hex doubles size. 16 MiB → ~32 MiB hex per slice.
// Keeping this well under CHUNK_LIMIT_BYTES (1 MiB) means each encrypted slice
// fits in one chunk POST with room to spare.
const FILE_SLICE_BYTES = 512 * 1024  // 512 KiB plaintext per slice

/**
 * Deterministically compute the total hex-string length that
 * streamEncryptAndUpload will produce, given the files and a sample
 * encrypted header length. Used to pre-calculate totalChunks so every
 * chunk POST carries the correct total_chunks value.
 *
 * Formula per slice: IV(12B → 24 hex) + (plainLen + 16 tag) * 2 hex chars
 */
function calcTotalHexLen(files, headerHexLen) {
  // 8-char length prefix + headerHexLen
  let total = 8 + headerHexLen
  for (const f of files) {
    const slices = Math.ceil(f.size / FILE_SLICE_BYTES) || 1
    for (let i = 0; i < slices; i++) {
      const isLast   = i === slices - 1
      const plainLen = isLast ? (f.size - i * FILE_SLICE_BYTES) : FILE_SLICE_BYTES
      total += 24 + (plainLen + 16) * 2
    }
  }
  return total
}

/**
 * Streaming encrypt-and-upload for file notes.
 * Encrypts each 512 KB slice and immediately pipelines it into the
 * chunked uploader — never accumulates more than ~4 MB in JS heap.
 *
 * @param {File[]}    files         - Files to encrypt
 * @param {CryptoKey} key           - AES-GCM-256 key
 * @param {string}    metaJson      - Serialised note meta
 * @param {object}    expiry        - { views } or { expiration }
 * @param {function}  onEncProgress - (doneSlices, totalSlices)
 * @param {function}  onUpProgress  - (doneChunks, totalChunks)
 * @returns {Promise<string>} note ID
 */
async function streamEncryptAndUpload(files, key, metaJson, expiry, onEncProgress, onUpProgress) {
  const chunkChars = CHUNK_SIZE_BYTES * 2  // hex chars per chunk POST

  // ── 1. Build manifest and encrypt header ──────────────────────────
  const manifest = files.map(f => ({
    name:   f.name,
    size:   f.size,
    type:   f.type || 'application/octet-stream',
    slices: Math.ceil(f.size / FILE_SLICE_BYTES) || 1,
  }))

  // Compute _sliceOffsets so decryptFileManifest() works identically.
  // Offsets are absolute positions in the final assembled hex string.
  const headerHex    = await encryptText(JSON.stringify(manifest), key)
  const headerLenHex = headerHex.length.toString(16).padStart(8, '0')
  const headerBlock  = headerLenHex + headerHex  // what sits at the very start

  let offsetPos = headerBlock.length
  for (const entry of manifest) {
    entry._sliceOffsets = []
    for (let i = 0; i < entry.slices; i++) {
      entry._sliceOffsets.push(offsetPos)
      const isLast   = i === entry.slices - 1
      const plainLen = isLast ? (entry.size - i * FILE_SLICE_BYTES) : FILE_SLICE_BYTES
      offsetPos += 24 + (plainLen + 16) * 2
    }
  }

  // ── 2. Pre-calculate totalChunks ──────────────────────────────────
  const totalHexLen  = calcTotalHexLen(files, headerHex.length)
  const totalChunks  = Math.ceil(totalHexLen / chunkChars)
  const uploadId     = generateUploadId()
  const totalSlices  = manifest.reduce((s, e) => s + e.slices, 0)

  // ── 3. Stream: encrypt slice → fill buffer → flush chunks ─────────
  let buffer      = headerBlock  // seed buffer with encrypted header
  let chunkIndex  = 0
  let doneSlices  = 0

  async function flushChunk(hex) {
    let attempt = 0
    while (true) {
      try {
        await apiPost('/api/chunks', {
          upload_id:    uploadId,
          chunk_index:  chunkIndex,
          total_chunks: totalChunks,
          data:         hex,
        })
        chunkIndex++
        onUpProgress && onUpProgress(chunkIndex, totalChunks)
        return
      } catch (e) {
        if (e.status === 429 && attempt < 3) {
          attempt++
          await new Promise(r => setTimeout(r, 1200 * attempt))
        } else {
          throw e
        }
      }
    }
  }

  for (const f of files) {
    const slices = Math.ceil(f.size / FILE_SLICE_BYTES) || 1
    for (let i = 0; i < slices; i++) {
      const blob     = f.slice(i * FILE_SLICE_BYTES, (i + 1) * FILE_SLICE_BYTES)
      const buf      = await blob.arrayBuffer()
      const sliceHex = await encrypt(new Uint8Array(buf), key)

      // Drain sliceHex into buffer, flushing complete chunks as we go
      let writePos = 0
      while (writePos < sliceHex.length) {
        const space  = chunkChars - buffer.length
        const take   = Math.min(space, sliceHex.length - writePos)
        buffer      += sliceHex.slice(writePos, writePos + take)
        writePos    += take
        if (buffer.length >= chunkChars) {
          await flushChunk(buffer)
          buffer = ''
        }
      }
      // sliceHex is now unreferenced and eligible for GC
      doneSlices++
      onEncProgress && onEncProgress(doneSlices, totalSlices)
    }
  }

  // Flush any remaining tail
  if (buffer.length > 0) {
    await flushChunk(buffer)
  }

  // ── 4. Finalise ───────────────────────────────────────────────────
  const completePayload = { upload_id: uploadId, meta: metaJson, ...expiry }
  const resp = await apiPost('/api/chunks/complete', completePayload)
  return resp.id
}


async function decryptToText(hexStr, key){
  const b = fromHex(hexStr)
  const pt = await crypto.subtle.decrypt({name:'AES-GCM',iv:b.slice(0,12)},key,b.slice(12))
  return new TextDecoder().decode(pt)
}

/**
 * Decrypt a file-mode payload produced by encryptFiles.
 * Returns the manifest array; each entry has .name/.size/.type/.slices.
 * Individual file blobs are decrypted on demand in dlFile().
 */
async function decryptFileManifest(hexStr, key){
  const headerLen = parseInt(hexStr.slice(0, 8), 16)
  const headerHex = hexStr.slice(8, 8 + headerLen)
  const manifest  = JSON.parse(await decryptToText(headerHex, key))
  // Attach slice offsets so dlFile can find each slice
  let pos = 8 + headerLen
  for(const entry of manifest){
    entry._sliceOffsets = []
    for(let i = 0; i < entry.slices; i++){
      entry._sliceOffsets.push(pos)
      // Advance pos: IV (24) + (slicePlainLen + 16 tag) * 2
      // For all but last slice, plainLen = FILE_SLICE_BYTES
      const isLast = (i === entry.slices - 1)
      const plainLen = isLast
        ? (entry.size - i * FILE_SLICE_BYTES)
        : FILE_SLICE_BYTES
      pos += 24 + (plainLen + 16) * 2
    }
  }
  return manifest
}

/**
 * Decrypt and download a single file entry from a manifest.
 * Reads and decrypts slices one at a time to keep memory bounded.
 */
async function decryptAndDownloadFile(hexStr, key, entry){
  const parts = []
  for(let i = 0; i < entry.slices; i++){
    const start = entry._sliceOffsets[i]
    const isLast = (i === entry.slices - 1)
    const plainLen = isLast ? (entry.size - i * FILE_SLICE_BYTES) : FILE_SLICE_BYTES
    const sliceHexLen = 24 + (plainLen + 16) * 2
    const sliceHex = hexStr.slice(start, start + sliceHexLen)
    const b = fromHex(sliceHex)
    const pt = await crypto.subtle.decrypt({name:'AES-GCM',iv:b.slice(0,12)},key,b.slice(12))
    parts.push(new Uint8Array(pt))
  }
  const blob = new Blob(parts, {type: entry.type || 'application/octet-stream'})
  const a = Object.assign(document.createElement('a'),{href:URL.createObjectURL(blob),download:entry.name})
  a.click()
  setTimeout(()=>URL.revokeObjectURL(a.href), 10000)
}

═══════════════════════════════════════════════════════════════════ */
async function copyToClipboard(text){
  if(navigator.clipboard && window.isSecureContext){
    try{
      await navigator.clipboard.writeText(text)
      toast('Copied to clipboard','ok')
      return
    } catch(_){}
  }
  try{
    const ta = document.createElement('textarea')
    ta.value = text
    ta.style.cssText = 'position:fixed;opacity:0;pointer-events:none'
    document.body.appendChild(ta)
    ta.focus(); ta.select()
    document.execCommand('copy')
    document.body.removeChild(ta)
    toast('Copied to clipboard','ok')
  } catch(_){
    toast('Could not copy — please copy manually','err')
  }
}

async function apiGet(path){
  const r = await fetch(path)
  if(!r.ok) throw Object.assign(new Error('api'),{status:r.status})
  return r.json()
}
async function apiPost(path, body){
  const r = await fetch(path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
  if(!r.ok) throw Object.assign(new Error('api'),{status:r.status})
  return r.json()
}
async function apiDelete(path){
  const r = await fetch(path,{method:'DELETE'})
  if(!r.ok) throw Object.assign(new Error('api'),{status:r.status})
  return r.json()
}

/* ═══════════════════════════════════════════════════════════════════
   CHUNKED UPLOAD
═══════════════════════════════════════════════════════════════════ */

// Per-chunk size: each chunk POST body is CHUNK_SIZE_BYTES binary (~2x hex chars).
// Overridden by server's chunk_size if provided.
let CHUNK_SIZE_BYTES = 1 * 1024 * 1024    // 1 MiB binary → ~2 MiB hex per chunk
// Files larger than CHUNK_LIMIT_BYTES always use the chunked path.
let CHUNK_LIMIT_BYTES = 1 * 1024 * 1024  // enter chunked mode above 1 MiB

function generateUploadId(){
  return crypto.randomUUID ? crypto.randomUUID() : toHex(crypto.getRandomValues(new Uint8Array(16)))
}

/**
 * Upload a hex-encoded encrypted payload, splitting into chunks if needed.
 * Used for text notes. File notes use streamEncryptAndUpload instead.
 *
 * @param {string}   hexPayload  - Full hex-encoded ciphertext
 * @param {string}   metaJson    - Serialised note meta
 * @param {object}   expiry      - { views } or { expiration }
 * @param {function} onProgress  - Called with (chunkIndex, totalChunks)
 * @returns {Promise<string>} note ID
 */
async function uploadPayload(hexPayload, metaJson, expiry, onProgress) {
  const chunkChars = CHUNK_SIZE_BYTES * 2  // hex chars per chunk

  // Small enough for a single direct request
  if (hexPayload.length <= chunkChars) {
    const resp = await apiPost('/api/notes', {
      contents: hexPayload,
      meta: metaJson,
      ...expiry,
    })
    onProgress && onProgress(1, 1)
    return resp.id
  }

  // Large text note — use chunked upload path
  const totalChunks = Math.ceil(hexPayload.length / chunkChars)
  const uploadId = generateUploadId()

  for (let i = 0; i < totalChunks; i++) {
    const chunk = hexPayload.slice(i * chunkChars, (i + 1) * chunkChars)
    let attempt = 0
    while (true) {
      try {
        await apiPost('/api/chunks', {
          upload_id:    uploadId,
          chunk_index:  i,
          total_chunks: totalChunks,
          data:         chunk,
        })
        break
      } catch (e) {
        if (e.status === 429 && attempt < 3) {
          attempt++
          await new Promise(r => setTimeout(r, 1200 * attempt))
        } else {
          throw e
        }
      }
    }
    onProgress && onProgress(i + 1, totalChunks)
  }

  const resp = await apiPost('/api/chunks/complete', {
    upload_id: uploadId,
    meta:      metaJson,
    ...expiry,
  })
  return resp.id
}

let _status = null

async function boot(){
  try{
    _status = await apiGet('/api/status')
    // chunk_size = max binary bytes per chunk the server accepts.
    // Update per-chunk size but leave CHUNK_LIMIT_BYTES at 1 MiB.
    if(_status?.chunk_size){
      CHUNK_SIZE_BYTES = Math.floor(_status.chunk_size / 2)
    }
  }catch{}
  applyTheme(_status)
  const m = location.pathname.match(/^\/note\/([A-Za-z0-9_-]+)\/?$/)
  if(m) await pageNote(m[1])
  else   await pageHome()
}

function applyTheme(s){
  if(!s) return
  if(s.theme_page_title) document.title = esc(s.theme_page_title)
  if(s.theme_favicon){
    let l = document.querySelector("link[rel~='icon']")||document.createElement('link')
    l.rel='icon'; l.href=esc(s.theme_favicon); document.head.appendChild(l)
  }
  if(s.theme_image){
    const a   = document.createElement('a'); a.href = '/'
    const img = document.createElement('img')
    img.className = 'logo-img'
    img.src = s.theme_image
    img.alt = 'Logo'
    a.appendChild(img)
    $('logoArea').innerHTML = ''
    $('logoArea').appendChild(a)
  }
  if(s.theme_text){
    const introEl = document.getElementById('themeIntro')
    if(introEl) introEl.innerHTML = s.theme_text
  }
  const ver = $('footerVer')
  if(ver) ver.textContent = `Emerald Password Share v${s.version||''}`
}

  </div>`)

  if(_status?.theme_text){
    const el = document.getElementById('themeIntro')

function renderInputArea(){

  if(!area) return
  if(_home.mode === 'text'){

          <div class="dropzone-icon">⬆</div>
          <div class="dropzone-label">Click or drag files here</div>

}

function renderFileList(){
  const c = $('dropContent')
  if(!c) return
  if(_home.files.length === 0){
    c.innerHTML = `<div class="dropzone-icon">⬆</div><div class="dropzone-label">Click or drag files here</div>`
  } else {
    c.innerHTML = `<ul class="file-list">${

function setMode(mode){
  _home.mode = mode
  _home.files = []
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'))
  $(`btnMode${mode==='text'?'Text':'File'}`)?.classList.add('active')
  renderInputArea()
}

function onDragOver(e){ e.preventDefault(); $('dropzone')?.classList.add('dragover') }
function onDragLeave(){ $('dropzone')?.classList.remove('dragover') }
function onDrop(e){
  e.preventDefault(); $('dropzone')?.classList.remove('dragover')
  _home.files.push(...Array.from(e.dataTransfer.files))
  renderFileList()
}
function onFileChange(e){ _home.files.push(...Array.from(e.target.files)); renderFileList() }
function removeFile(e,i){ e.stopPropagation(); _home.files.splice(i,1); renderFileList() }

function toggleAdvanced(){
  _home.advanced = !_home.advanced
  const sw = $('advSW')
  if(sw) sw.classList.toggle('on', _home.advanced)
  const panel = $('advPanel')
  if(panel) panel.classList.toggle('open', _home.advanced)
  if(!_home.advanced){ _home.timeMode=false; updateStatus() }
}

function toggleTimeMode(){
  _home.timeMode = !_home.timeMode
  const sw = $('timeSW'); if(sw) sw.classList.toggle('on',_home.timeMode)
  const lbl = $('limitLabel'); if(lbl) lbl.textContent=_home.timeMode?'Minutes':'Views'
  const inp = $('limitVal'); if(inp){ inp.value=_home.timeMode?60:1; inp.max=_home.timeMode?(_status?.max_expiration||360):(_status?.max_views||100) }
  updateStatus()
}

function describeExpiry(){
  if(!_home.advanced) return 'Note will self-destruct after 1 view.'
  const v = $('limitVal')?.value || 1
  if(_home.timeMode) return `Note will self-destruct after ${v} minute${v==1?'':'s'}.`
  return `Note will self-destruct after ${v} view${v==1?'':'s'}.`
}

function updateStatus(){
  const el = $('statusMsg'); if(el && !_home.busy) el.textContent = describeExpiry()
}

function setProgress(done, total){
  const wrap  = $('progressWrap')
  const fill  = $('progressFill')
  const label = $('progressLabel')
  if(!wrap) return
  const pct = total > 0 ? Math.round((done / total) * 100) : 0
  wrap.classList.add('visible')
  if(fill)  fill.style.width = pct + '%'
  if(label) label.textContent = total > 1
    ? `Uploading chunk ${done} of ${total} (${pct}%)`
    : `Uploading… ${pct}%`
}

function setBusy(msg){
  _home.busy = true
  const btn = $('submitBtn')
  if(btn){
    btn.disabled = true
    btn.textContent = msg
    const sp = document.createElement('span'); sp.className='spinner'
    btn.appendChild(sp)
  }
  const sm = $('statusMsg')
  if(sm){
    sm.textContent = msg
    const sp = document.createElement('span'); sp.className='spinner'
    sm.appendChild(sp)
  }
}

async function handleCreate(){
  if(_home.busy) return
  setBusy('Encrypting')

  try{
    const pw = $('customPw')?.value.trim() || ''
    let key, derivation

    if(pw){
      const d = await deriveKey(pw, null)
      key=d.key; derivation=d.saltHex
    } else {
      key = await genKey()
    }

    let contents, type
    if(_home.mode === 'file'){
      if(_home.files.length === 0){ toast('No files selected','err'); _home.busy=false; await pageHome(); return }
      type = 'file'
    } else {
      const txt = $('noteText')?.value || ''
      if(!txt.trim()){ toast('Note is empty','err'); _home.busy=false; await pageHome(); return }
      contents = await encryptText(txt, key)
      type = 'text'
    }

    const meta = {type}
    if(derivation) meta.derivation = derivation

    const limitVal = parseInt($('limitVal')?.value||'1') || 1
    const expiry = {}
    if(_home.advanced && _home.timeMode) expiry.expiration = limitVal
    else expiry.views = _home.advanced ? limitVal : 1

    setBusy('Uploading')

    let noteId
    if(_home.mode === 'file'){
      // Streaming path: never builds a giant hex string in memory
      noteId = await streamEncryptAndUpload(
        _home.files,
        key,
        JSON.stringify(meta),
        expiry,
        (doneSlices, totalSlices) => {
          const pct = Math.round(doneSlices / totalSlices * 100)
          const sm = $('statusMsg'); if(sm) sm.textContent = `Encrypting… ${pct}%`
        },
        (doneChunks, totalChunks) => setProgress(doneChunks, totalChunks)
      )
    } else {
      // Text path: small payload, single request or chunked if large
      noteId = await uploadPayload(
        contents,
        JSON.stringify(meta),
        expiry,
        (done, total) => setProgress(done, total)
      )
    }

    const keyHex = pw ? null : await exportKeyHex(key)
    const url = `${location.origin}/note/${noteId}${keyHex?'#'+keyHex:''}`

    toast('Note created successfully','ok')
    pageResult(url, pw)
  } catch(err){
    if(err.status===413) toast('Note is too large','err')
    else if(err.status===429) toast('Too many requests — please wait a moment','err')
    else toast('Failed to create note. Please try again.','err')
    console.error(err)
    _home.busy = false
    await pageHome()
  }
}

function pageResult(url, hasCustomPw){
  const mailto = `mailto:?subject=${encodeURIComponent('Shared secure note')}&body=${encodeURIComponent(url)}`
  render(`<div class="page">
    <div class="result-card">
      <h2>Note created</h2>
      <div class="field">
        <span class="label">Share link</span>
        <div class="input-row">
          <input type="text" id="shareUrl" readonly value="${esc(url)}"/>
          <button class="btn-icon" onclick="copyShareUrl()">Copy</button>
        </div>
      </div>
      ${hasCustomPw ? `<p class="hint" style="margin-top:0.5rem">⚠ Password is required to open this note — share it separately.</p>` : ''}
      <div class="info-box" style="margin-top:0.8rem">
        ⚠ The link contains the decryption key. Anyone with the link can read the note — treat it like a password.
      </div>
      <div class="result-actions">
        <a href="${esc(mailto)}" style="text-decoration:none">
          <button class="btn-outline">✉ Send via email</button>
        </a>
        <button class="btn-ghost" onclick="startOver()">New note</button>
      </div>
    </div>
  </div>`)
}

function copyShareUrl(){
  const url = $('shareUrl')?.value || ''

function startOver(){
  _home.mode='text'; _home.advanced=false; _home.timeMode=false; _home.files=[]; _home.busy=false
  _private.clear()
  pageHome()
}

async function pageNote(id){
  const hashKey = location.hash.slice(1)

  render(`<div style="color:var(--t2);font-size:0.82rem;padding-top:1rem">Checking…<span class="spinner"></span></div>`)

  let meta
  try{
    const info = await apiGet(`/api/notes/${id}`)
    meta = JSON.parse(info.meta || '{}')
  } catch(e){
    const msg = e.status === 429
      ? 'Too many requests — please wait a moment and try again.'
      : 'This note was not found, has already been viewed, or has expired.'
    render(`<div class="page">
      <p style="color:var(--red);margin-bottom:1rem">${esc(msg)}</p>
      <a href="/"><button class="btn-ghost">← Create a new note</button></a>
    </div>`)
    return
  }

  if(meta.derivation){
    renderPasswordPrompt(id, meta)
  } else if(hashKey){
    renderRevealButton(id, meta, hashKey)
  } else {
    render(`<div class="page">
      <p style="color:var(--red);margin-bottom:1rem">Decryption key missing — the link may be incomplete.</p>
      <a href="/"><button class="btn-ghost">← Create a new note</button></a>
    </div>`)
  }
}

    </div>
    <button class="btn-primary" id="revealBtn" onclick="revealNote('${esc(id)}','pw',null)">Reveal note</button>
    <p id="revealErr" class="error" style="display:none"></p>
  </div>`)
}

async function revealNote(id, pwMode, hashKey){
  const btn = $('revealBtn'); if(!btn) return
  const errEl = $('revealErr')
  btn.disabled=true
  btn.textContent='Decrypting'
  const sp = document.createElement('span'); sp.className='spinner'; btn.appendChild(sp)
  if(errEl) errEl.style.display='none'

  try{
    const data = await apiDelete(`/api/notes/${id}`)
    const meta = _pendingNoteMeta || {}
    let key

    if(pwMode === 'pw'){
      const pw = $('pwInput')?.value
      if(!pw){ throw Object.assign(new Error('No password')) }
      const d = await deriveKey(pw, meta.derivation)
      key = d.key
    } else {
      key = await importKeyHex(hashKey)
    }

    const plaintext = await decryptToText(data.contents, key)

    if(meta.type === 'file'){
      const manifest = await decryptFileManifest(data.contents, key)
      renderDecryptedFiles(manifest, data.contents, key)
    } else {
      renderDecryptedText(plaintext)
    }
  } catch(e){
    let msg
    if(e.status === 404)      msg = 'Note not found — it may have already been viewed.'
    else if(e.status === 429) msg = 'Too many requests — please wait a moment.'
    else                      msg = 'Decryption failed. Wrong password or broken link.'
    if(errEl){ errEl.textContent=msg; errEl.style.display='block' }
    if(btn){ btn.disabled=false; btn.textContent='Try again' }
  }
}

function renderDecryptedText(text){
  const urlRe = /[A-Za-z][A-Za-z0-9+\-.]*:\/\/[^\s<>"']+/g
  const links  = [...new Set(text.match(urlRe)||[])]

  _private.setPlaintext(text)

  const noteBox = document.createElement('div')
  noteBox.className = 'note-box'
  noteBox.textContent = text

  const container = document.createElement('div')
  container.className = 'page'

  const warn = document.createElement('div')
  warn.className = 'warning'
  warn.innerHTML = '⚠ <strong>This is your one chance</strong> to read this note. It has been permanently deleted.'
  container.appendChild(warn)
  container.appendChild(noteBox)

  const btnRow = document.createElement('div')
  btnRow.style.cssText = 'display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1rem'
  const copyBtn = document.createElement('button')
  copyBtn.className = 'btn-outline'
  copyBtn.textContent = 'Copy to clipboard'
  copyBtn.onclick = copyPlaintext
  const newBtn = document.createElement('a')
  newBtn.href = '/'
  newBtn.innerHTML = '<button class="btn-ghost">← New note</button>'
  btnRow.appendChild(copyBtn)
  btnRow.appendChild(newBtn)
  container.appendChild(btnRow)

  if(links.length){
    const linksBox = document.createElement('div')
    linksBox.className = 'links-box'
    const p = document.createElement('p')
    p.textContent = 'Links found in this note:'
    linksBox.appendChild(p)
    links.forEach(l=>{
      const a = document.createElement('a')
      a.href = l
      a.target = '_blank'
      a.rel = 'noopener noreferrer'
      a.textContent = l
      linksBox.appendChild(a)
    })
    container.appendChild(linksBox)
  }

  render(container)
}

function copyPlaintext(){
  copyToClipboard(_private.getPlaintext() || '')
}

function renderDecryptedFiles(manifest, hexStr, key){
  _private.setDecFiles({manifest, hexStr, key})

  render(`<div class="page">
    <div class="warning">⚠ <strong>This is your one chance</strong> to download these files. They have been permanently deleted.</div>
    <div class="info-box">Save all files before navigating away — they cannot be recovered.</div>
    ${manifest.map((f,i)=>`
      <div class="file-dl-row">
        <div>
          <div class="file-dl-name">${esc(f.name)}</div>
          <div class="file-dl-meta">${esc(f.type)} · ${fmtBytes(f.size)}</div>
        </div>
        <button class="file-dl-btn" onclick="dlFile(${i})">↓ Download</button>
      </div>`).join('')}
    <div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:0.8rem">
      <button class="btn-outline" onclick="dlAll()">↓ Download all</button>
      <a href="/"><button class="btn-ghost">← New note</button></a>
    </div>
  </div>`)
}

async function dlFile(i){
  const d = _private.getDecFiles()
  if(!d) return
  await decryptAndDownloadFile(d.hexStr, d.key, d.manifest[i])
}

async function dlAll(){
  const d = _private.getDecFiles()
  if(!d) return
  for(let i = 0; i < d.manifest.length; i++) await dlFile(i)
}
